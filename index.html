<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            display: block;
            background: #222;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-family: monospace;
            font-size: 16px;
            background: rgba(0,0,0,0.6);
            padding: 8px 12px;
            border-radius: 4px;
            pointer-events: none;
            user-select: none;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="ui">X: 0, Y: 0</div>
    <div id="deathScreen" style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:none; justify-content:center; align-items:center; flex-direction:column; color:#fff; font-family:monospace;">
        <h1 style="font-size:48px; color:#e53935; margin-bottom:20px;">ВЫ УМЕРЛИ</h1>
        <p id="deathStats" style="font-size:18px; margin-bottom:30px;"></p>
        <button id="restartBtn" style="padding:12px 30px; font-size:20px; background:#4caf50; color:#fff; border:none; border-radius:6px; cursor:pointer; font-family:monospace;">Начать заново</button>
    </div>
    <div id="chestUI" style="display:none; position:absolute; bottom:100px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.85); border:1px solid #555; border-radius:6px; padding:10px; color:#fff; font-family:monospace; min-width:300px;">
        <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
            <span style="color:#ffd54f;">Сундук</span>
            <span style="color:#aaa; font-size:12px;">Нажми E чтобы закрыть</span>
        </div>
        <div id="chestItems" style="display:flex; flex-wrap:wrap; gap:4px; min-height:40px;"></div>
        <div style="margin-top:6px; padding-top:6px; border-top:1px solid #444;">
            <span style="color:#aaa; font-size:11px;">Выделенный слот: <span id="chestSelectedSlot">1</span> — нажми Q чтобы положить</span>
        </div>
    </div>
    <div id="merchantUI" style="display:none; position:absolute; bottom:100px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.85); border:1px solid #7b1fa2; border-radius:6px; padding:10px; color:#fff; font-family:monospace; min-width:350px;">
        <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
            <span style="color:#ce93d8;">Торговец</span>
            <span style="color:#aaa; font-size:12px;">Нажми E чтобы закрыть</span>
        </div>
        <div style="margin-bottom:6px; color:#ffd54f; font-size:13px;">Монеты: <span id="merchantGold">0</span></div>
        <div id="merchantStock" style="display:flex; flex-wrap:wrap; gap:4px; min-height:40px; margin-bottom:8px;"></div>
        <div style="padding-top:6px; border-top:1px solid #444;">
            <span style="color:#aaa; font-size:11px;">Выделенный слот: <span id="merchantSelectedSlot">1</span> — нажми Q чтобы продать</span>
        </div>
    </div>
    <div id="craftingUI" style="display:none; position:absolute; bottom:100px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.85); border:1px solid #ff8f00; border-radius:6px; padding:10px; color:#fff; font-family:monospace; min-width:400px;">
        <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
            <span style="color:#ffd54f;">Крафт</span>
            <span style="color:#aaa; font-size:12px;">Нажми C чтобы открыть/закрыть</span>
        </div>
        <div id="craftingResources" style="color:#aaa; font-size:11px; margin-bottom:8px;"></div>
        <div id="craftingRecipes" style="display:flex; flex-wrap:wrap; gap:4px; min-height:40px;"></div>
    </div>
    <div id="settingsBtn" style="position:absolute; top:10px; right:10px; padding:6px 12px; background:rgba(0,0,0,0.6); color:#aaa; border:1px solid #555; border-radius:4px; cursor:pointer; font-family:monospace; font-size:14px;">⚙</div>
    <div id="settingsScreen" style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); justify-content:center; align-items:center; flex-direction:column; color:#fff; font-family:monospace;">
        <h2 style="margin-bottom:20px;">Настройки управления</h2>
        <div id="settingsContent" style="display:flex; flex-direction:column; gap:10px; min-width:300px;"></div>
        <button id="settingsCloseBtn" style="margin-top:20px; padding:8px 20px; font-size:16px; background:#555; color:#fff; border:none; border-radius:4px; cursor:pointer; font-family:monospace;">Закрыть</button>
    </div>

    <script src="js/perlin.js"></script>
    <script src="js/tilemap.js"></script>
    <script src="js/safeZone.js"></script>
    <script src="js/flower.js"></script>
    <script src="js/web.js"></script>
    <script src="js/pathfinding.js"></script>
    <script src="js/particles.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/arrow.js"></script>
    <script src="js/item.js"></script>
    <script src="js/chest.js"></script>
    <script src="js/potion.js"></script>
    <script src="js/boss.js"></script>
    <script src="js/bossArea.js"></script>
    <script src="js/bed.js"></script>
    <script src="js/achievements.js"></script>
    <script src="js/effects.js"></script>
    <script src="js/crafting.js"></script>
    <script src="js/skills.js"></script>
    <script src="js/merchant.js"></script>
    <script src="js/enemy.js"></script>
    <script src="js/player.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/game.js"></script>
    <script>
        const game = new Game('gameCanvas', 'ui');
    </script>
</body>
</html>
