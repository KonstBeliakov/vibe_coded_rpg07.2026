<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            display: block;
            background: #222;
            border: 1px solid #444;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-family: monospace;
            font-size: 16px;
            background: rgba(0,0,0,0.6);
            padding: 8px 12px;
            border-radius: 4px;
            pointer-events: none;
            user-select: none;
        }
        #inventory {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            user-select: none;
        }
        .slot {
            width: 60px;
            height: 60px;
            background: rgba(0,0,0,0.6);
            border: 2px solid #555;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #aaa;
            font-family: monospace;
            font-size: 12px;
            position: relative;
            transition: border-color 0.1s;
        }
        .slot.active {
            border-color: #ffd700;
            background: rgba(255,215,0,0.15);
        }
        .slot .index {
            position: absolute;
            top: 3px;
            left: 5px;
            font-size: 10px;
            color: #666;
        }
        .slot .item-icon {
            font-size: 24px;
            color: #fff;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui">X: 0, Y: 0</div>
    <div id="inventory"></div>
    <script>
        // ========== Perlin Noise ==========
        // Simple 2D Perlin noise implementation
        class PerlinNoise {
            constructor(seed) {
                this.perm = [];
                const p = [];
                for (let i = 0; i < 256; i++) p.push(i);
                // Shuffle with seed
                let s = seed || Math.random() * 10000;
                for (let i = 255; i > 0; i--) {
                    s = (s * 16807 + 0) % 2147483647;
                    const j = s % (i + 1);
                    [p[i], p[j]] = [p[j], p[i]];
                }
                for (let i = 0; i < 512; i++) {
                    this.perm[i] = p[i & 255];
                }
            }

            fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
            lerp(a, b, t) { return a + t * (b - a); }
            grad(hash, x, y) {
                const h = hash & 3;
                const u = h < 2 ? x : y;
                const v = h < 2 ? y : x;
                return ((h & 1) === 0 ? u : -u) + ((h & 2) === 0 ? v : -v);
            }

            noise(x, y) {
                const X = Math.floor(x) & 255;
                const Y = Math.floor(y) & 255;
                const xf = x - Math.floor(x);
                const yf = y - Math.floor(y);
                const u = this.fade(xf);
                const v = this.fade(yf);
                const aa = this.perm[this.perm[X] + Y];
                const ab = this.perm[this.perm[X] + Y + 1];
                const ba = this.perm[this.perm[X + 1] + Y];
                const bb = this.perm[this.perm[X + 1] + Y + 1];
                return this.lerp(
                    this.lerp(this.grad(aa, xf, yf), this.grad(ba, xf - 1, yf), u),
                    this.lerp(this.grad(ab, xf, yf - 1), this.grad(bb, xf - 1, yf - 1), u),
                    v
                );
            }

            // Octave noise for more interesting terrain
            octaveNoise(x, y, octaves, persistence) {
                let total = 0;
                let frequency = 1;
                let amplitude = 1;
                let maxValue = 0;
                for (let i = 0; i < octaves; i++) {
                    total += this.noise(x * frequency, y * frequency) * amplitude;
                    maxValue += amplitude;
                    amplitude *= persistence;
                    frequency *= 2;
                }
                return total / maxValue;
            }
        }

        // ========== TileMap (Infinite) ==========
        const TILE_SIZE = 40;
        const TILE_EMPTY = 0;
        const TILE_WALL = 1;
        const CHUNK_SIZE = 16;

        class TileMap {
            constructor(seed) {
                this.perlin = new PerlinNoise(seed);
                this.scale = 0.08;
                this.threshold = 0.15;
                this.chunks = new Map();
            }

            getChunkKey(cx, cy) {
                return `${cx},${cy}`;
            }

            generateChunk(cx, cy) {
                const key = this.getChunkKey(cx, cy);
                if (this.chunks.has(key)) return;

                const tiles = [];
                for (let y = 0; y < CHUNK_SIZE; y++) {
                    tiles[y] = [];
                    for (let x = 0; x < CHUNK_SIZE; x++) {
                        const wx = cx * CHUNK_SIZE + x;
                        const wy = cy * CHUNK_SIZE + y;
                        const noiseVal = this.perlin.octaveNoise(wx * this.scale, wy * this.scale, 3, 0.5);
                        tiles[y][x] = noiseVal > this.threshold ? TILE_WALL : TILE_EMPTY;
                    }
                }

                // Ensure clear area around spawn (chunk 0,0 center)
                if (cx === 0 && cy === 0) {
                    const center = Math.floor(CHUNK_SIZE / 2);
                    for (let dy = -2; dy <= 2; dy++) {
                        for (let dx = -2; dx <= 2; dx++) {
                            const ty = center + dy;
                            const tx = center + dx;
                            if (ty >= 0 && ty < CHUNK_SIZE && tx >= 0 && tx < CHUNK_SIZE) {
                                tiles[ty][tx] = TILE_EMPTY;
                            }
                        }
                    }
                }

                this.chunks.set(key, tiles);
            }

            getTile(tileX, tileY) {
                const cx = Math.floor(tileX / CHUNK_SIZE);
                const cy = Math.floor(tileY / CHUNK_SIZE);
                const key = this.getChunkKey(cx, cy);

                if (!this.chunks.has(key)) {
                    this.generateChunk(cx, cy);
                }

                const chunk = this.chunks.get(key);
                const lx = ((tileX % CHUNK_SIZE) + CHUNK_SIZE) % CHUNK_SIZE;
                const ly = ((tileY % CHUNK_SIZE) + CHUNK_SIZE) % CHUNK_SIZE;
                return chunk[ly][lx];
            }

            isWall(tileX, tileY) {
                return this.getTile(tileX, tileY) === TILE_WALL;
            }

            draw(ctx, offsetX, offsetY) {
                const startX = Math.floor(-offsetX / TILE_SIZE) - 1;
                const startY = Math.floor(-offsetY / TILE_SIZE) - 1;
                const endX = startX + Math.ceil(ctx.canvas.width / TILE_SIZE) + 2;
                const endY = startY + Math.ceil(ctx.canvas.height / TILE_SIZE) + 2;

                for (let y = startY; y < endY; y++) {
                    for (let x = startX; x < endX; x++) {
                        const screenX = x * TILE_SIZE + offsetX;
                        const screenY = y * TILE_SIZE + offsetY;

                        if (this.isWall(x, y)) {
                            ctx.fillStyle = '#555';
                        } else {
                            ctx.fillStyle = '#2a2a2a';
                        }

                        ctx.fillRect(screenX, screenY, TILE_SIZE, TILE_SIZE);

                        // Grid lines
                        ctx.strokeStyle = '#333';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
                    }
                }
            }
        }

        // ========== Arrow ==========
        class Arrow {
            constructor(x, y, targetX, targetY) {
                this.x = x;
                this.y = y;
                const dx = targetX - x;
                const dy = targetY - y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                this.vx = (dx / dist) * 8;
                this.vy = (dy / dist) * 8;
                this.size = 6;
                this.damage = 12;
                this.alive = true;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
            }

            draw(ctx, offsetX, offsetY) {
                const screenX = this.x + offsetX;
                const screenY = this.y + offsetY;
                ctx.fillStyle = '#ffd54f';
                ctx.save();
                ctx.translate(screenX, screenY);
                ctx.rotate(Math.atan2(this.vy, this.vx));
                ctx.fillRect(-this.size, -2, this.size * 2, 4);
                ctx.restore();
            }
        }

        // ========== Item ==========
        class Item {
            constructor(name, texturePath) {
                this.name = name;
                this.texture = new Image();
                this.texture.src = texturePath;
                this.loaded = false;
                this.texture.onload = () => { this.loaded = true; };
            }
        }

        // ========== Enemy Types ==========
        // Base Enemy class
        class Enemy {
            constructor(x, y, config) {
                this.x = x;
                this.y = y;
                this.speed = config.speed || 1.2;
                this.size = config.size || 20;
                this.color = config.color || '#e53935';
                this.maxHealth = config.health || 50;
                this.health = this.maxHealth;
                this.attackCooldown = config.attackCooldown || 800;
                this.attackTimer = 0;
                this.attackRange = config.attackRange || 35;
                this.attackDamage = config.attackDamage || 8;
                this.attackAnimDuration = config.attackAnimDuration || 200;
                this.attackAnimTimer = 0;
                this.xpReward = config.xpReward || 10;
                this.type = config.type || 'normal';
            }

            update(playerX, playerY) {
                const dx = playerX - this.x;
                const dy = playerY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > 0) {
                    this.x += (dx / dist) * this.speed;
                    this.y += (dy / dist) * this.speed;
                }

                if (this.attackTimer > 0) this.attackTimer -= 16;
                if (this.attackAnimTimer > 0) this.attackAnimTimer -= 16;
            }

            tryAttack(playerX, playerY) {
                if (this.attackTimer > 0) return false;
                const dx = playerX - this.x;
                const dy = playerY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist <= this.attackRange) {
                    this.attackTimer = this.attackCooldown;
                    this.attackAnimTimer = this.attackAnimDuration;
                    return true;
                }
                return false;
            }

            draw(ctx, offsetX, offsetY) {
                const screenX = this.x + offsetX;
                const screenY = this.y + offsetY;

                // Attack animation
                if (this.attackAnimTimer > 0) {
                    const progress = 1 - this.attackAnimTimer / this.attackAnimDuration;
                    const angle = progress * Math.PI * 1.5 - Math.PI * 0.75;
                    const dx = this.x - offsetX;
                    const dy = this.y - offsetY;
                    const baseAngle = Math.atan2(dy, dx);

                    ctx.save();
                    ctx.translate(screenX, screenY);
                    ctx.rotate(baseAngle);
                    ctx.strokeStyle = '#ff8a80';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    const r = this.size / 2 + 3;
                    const startA = -Math.PI * 0.6;
                    const endA = startA + angle;
                    ctx.arc(0, 0, r, startA, endA);
                    ctx.stroke();
                    ctx.restore();
                }

                // Body
                ctx.fillStyle = this.color;
                ctx.fillRect(
                    screenX - this.size / 2,
                    screenY - this.size / 2,
                    this.size,
                    this.size
                );

                // Health bar
                const barWidth = this.size + 10;
                const barHeight = 4;
                const barX = screenX - barWidth / 2;
                const barY = screenY - this.size / 2 - 10;
                const healthPercent = this.health / this.maxHealth;

                ctx.fillStyle = '#c62828';
                ctx.fillRect(barX, barY, barWidth, barHeight);
                ctx.fillStyle = '#4caf50';
                ctx.fillRect(barX, barY, barWidth * healthPercent, barHeight);
            }
        }

        // Fast enemy type
        class FastEnemy extends Enemy {
            constructor(x, y) {
                super(x, y, {
                    speed: 2.5,
                    size: 16,
                    color: '#ff9800',
                    health: 30,
                    attackCooldown: 600,
                    attackRange: 30,
                    attackDamage: 5,
                    xpReward: 15,
                    type: 'fast'
                });
            }
        }

        // Tank enemy type
        class TankEnemy extends Enemy {
            constructor(x, y) {
                super(x, y, {
                    speed: 0.7,
                    size: 28,
                    color: '#7b1fa2',
                    health: 150,
                    attackCooldown: 1200,
                    attackRange: 40,
                    attackDamage: 15,
                    xpReward: 30,
                    type: 'tank'
                });
            }
        }

        // Flying enemy type (moves in sine wave pattern)
        class FlyingEnemy extends Enemy {
            constructor(x, y) {
                super(x, y, {
                    speed: 1.8,
                    size: 18,
                    color: '#00bcd4',
                    health: 40,
                    attackCooldown: 1000,
                    attackRange: 50,
                    attackDamage: 7,
                    xpReward: 20,
                    type: 'flying'
                });
                this.waveOffset = Math.random() * Math.PI * 2;
                this.baseY = y;
            }

            update(playerX, playerY) {
                this.waveOffset += 0.05;
                // Move toward player but with sine wave on perpendicular axis
                const dx = playerX - this.x;
                const dy = playerY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > 0) {
                    // Move toward player
                    this.x += (dx / dist) * this.speed;
                    // Sine wave perpendicular movement
                    this.y += (dy / dist) * this.speed + Math.sin(this.waveOffset) * 1.5;
                }

                if (this.attackTimer > 0) this.attackTimer -= 16;
                if (this.attackAnimTimer > 0) this.attackAnimTimer -= 16;
            }
        }

        // ========== Player ==========
        class Player {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.speed = 3;
                this.size = 20;
                this.color = '#4fc3f7';
                this.maxHealth = 100;
                this.health = this.maxHealth;
                this.baseAttackCooldown = 400; // ms
                this.baseAttackRange = 50;
                this.baseAttackDamage = 15;
                this.attackCooldown = this.baseAttackCooldown;
                this.attackTimer = 0;
                this.attackRange = this.baseAttackRange;
                this.attackDamage = this.baseAttackDamage;
                this.attackAnimDuration = 200; // ms
                this.attackAnimTimer = 0;
                this.facingDir = { x: 0, y: -1 }; // default facing up
            }

            applyItemStats(item) {
                if (item) {
                    // Item provides full stats
                    this.attackRange = this.baseAttackRange;
                    this.attackDamage = this.baseAttackDamage;
                    this.attackCooldown = this.baseAttackCooldown;
                } else {
                    // Empty slot - reduced stats
                    this.attackRange = this.baseAttackRange * 0.5;
                    this.attackDamage = Math.floor(this.baseAttackDamage * 0.4);
                    this.attackCooldown = this.baseAttackCooldown * 1.5;
                }
            }

            update(keys) {
                let dx = 0, dy = 0;
                if (keys['w'] || keys['W']) dy = -1;
                if (keys['s'] || keys['S']) dy = 1;
                if (keys['a'] || keys['A']) dx = -1;
                if (keys['d'] || keys['D']) dx = 1;

                // Normalize diagonal movement
                if (dx !== 0 && dy !== 0) {
                    const len = Math.sqrt(dx * dx + dy * dy);
                    dx /= len;
                    dy /= len;
                }

                if (dx !== 0 || dy !== 0) {
                    this.facingDir = { x: dx, y: dy };
                }

                this.x += dx * this.speed;
                this.y += dy * this.speed;

                // Update attack cooldown
                if (this.attackTimer > 0) {
                    this.attackTimer -= 16; // approximate per frame
                }
                if (this.attackAnimTimer > 0) {
                    this.attackAnimTimer -= 16;
                }
            }

            attack() {
                if (this.attackTimer > 0) return false;
                this.attackTimer = this.attackCooldown;
                this.attackAnimTimer = this.attackAnimDuration;
                return true;
            }

            draw(ctx, screenX, screenY) {
                // Attack animation - draw slash arc
                if (this.attackAnimTimer > 0) {
                    const progress = 1 - this.attackAnimTimer / this.attackAnimDuration;
                    const angle = progress * Math.PI * 1.5 - Math.PI * 0.75;
                    const slashLen = 30;
                    const baseAngle = Math.atan2(this.facingDir.y, this.facingDir.x);

                    ctx.save();
                    ctx.translate(screenX, screenY);
                    ctx.rotate(baseAngle);

                    // Draw slash arc
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    const r = this.size / 2 + 5;
                    const startA = -Math.PI * 0.6;
                    const endA = startA + angle;
                    ctx.arc(0, 0, r, startA, endA);
                    ctx.stroke();

                    ctx.restore();
                }

                // Body
                ctx.fillStyle = this.color;
                ctx.fillRect(
                    screenX - this.size / 2,
                    screenY - this.size / 2,
                    this.size,
                    this.size
                );
            }
        }

        // ========== Game ==========
        class Game {
            constructor(canvasId, uiId) {
                this.canvas = document.getElementById(canvasId);
                this.ctx = this.canvas.getContext('2d');
                this.ui = document.getElementById(uiId);

                this.resize();
                window.addEventListener('resize', () => this.resize());

                this.keys = {};
                window.addEventListener('keydown', (e) => {
                    this.keys[e.key] = true;
                    if (e.key === ' ') {
                        this.playerAttack();
                    }
                    // Number keys 1-8 for slot switching
                    const num = parseInt(e.key);
                    if (num >= 1 && num <= this.inventorySlots) {
                        this.selectedSlot = num - 1;
                        this.player.applyItemStats(this.slots[this.selectedSlot]);
                        this.updateInventoryUI();
                    }
                });
                window.addEventListener('keyup', (e) => {
                    this.keys[e.key] = false;
                });

                this.tileMap = new TileMap(42);
                // Place player at origin (center of chunk 0,0)
                this.player = new Player(0, 0);
                this.enemies = [];
                this.arrows = [];
                this.mouseX = 0;
                this.mouseY = 0;
                this.spawnTimer = 0;
                this.spawnInterval = 2000; // ms
                this.playerXP = 0;
                this.playerLevel = 1;
                this.xpToNextLevel = 50;

                // Mouse tracking
                window.addEventListener('mousemove', (e) => {
                    this.mouseX = e.clientX;
                    this.mouseY = e.clientY;
                });

                // Inventory
                this.inventorySlots = 8;
                this.selectedSlot = 0;
                this.slots = new Array(this.inventorySlots).fill(null);
                this.inventoryEl = document.getElementById('inventory');

                // Put sword in first slot, bow in second slot
                this.slots[0] = new Item('Меч', 'no_texture.png');
                this.slots[1] = new Item('Лук', 'no_texture.png');

                this.createInventoryUI();

                // Mouse wheel switching
                window.addEventListener('wheel', (e) => {
                    if (e.deltaY > 0) {
                        this.selectedSlot = (this.selectedSlot + 1) % this.inventorySlots;
                    } else {
                        this.selectedSlot = (this.selectedSlot - 1 + this.inventorySlots) % this.inventorySlots;
                    }
                    this.player.applyItemStats(this.slots[this.selectedSlot]);
                    this.updateInventoryUI();
                });

                this.lastTime = performance.now();
                this.run();
            }

            createInventoryUI() {
                this.inventoryEl.innerHTML = '';
                for (let i = 0; i < this.inventorySlots; i++) {
                    const slot = document.createElement('div');
                    slot.className = 'slot' + (i === this.selectedSlot ? ' active' : '');
                    const item = this.slots[i];
                    let inner = `<span class="index">${i + 1}</span>`;
                    if (item) {
                        if (item.loaded) {
                            const img = document.createElement('img');
                            img.src = item.texture.src;
                            img.style.width = '32px';
                            img.style.height = '32px';
                            img.style.imageRendering = 'pixelated';
                            slot.appendChild(img);
                        } else {
                            inner += '<span class="item-icon">?</span>';
                            item.texture.onload = () => {
                                this.createInventoryUI();
                            };
                        }
                    }
                    slot.innerHTML = inner + slot.innerHTML;
                    this.inventoryEl.appendChild(slot);
                }
            }

            updateInventoryUI() {
                const slots = this.inventoryEl.children;
                for (let i = 0; i < slots.length; i++) {
                    slots[i].className = 'slot' + (i === this.selectedSlot ? ' active' : '');
                }
            }

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
                this.width = this.canvas.width;
                this.height = this.canvas.height;
            }

            playerAttack() {
                if (!this.player.attack()) return;

                const px = this.player.x;
                const py = this.player.y;

                // Check if bow is selected (slot index 1)
                const selectedItem = this.slots[this.selectedSlot];
                if (selectedItem && selectedItem.name === 'Лук') {
                    // Ranged attack - shoot arrow toward mouse
                    const worldMouseX = px + (this.mouseX - this.width / 2);
                    const worldMouseY = py + (this.mouseY - this.height / 2);
                    this.arrows.push(new Arrow(px, py, worldMouseX, worldMouseY));
                } else {
                    // Melee attack
                    const range = this.player.attackRange;
                    const damage = this.player.attackDamage;

                    for (let i = this.enemies.length - 1; i >= 0; i--) {
                        const enemy = this.enemies[i];
                        const dx = enemy.x - px;
                        const dy = enemy.y - py;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist <= range) {
                            enemy.health -= damage;
                            if (enemy.health <= 0) {
                                this.addXP(enemy.xpReward);
                                this.enemies.splice(i, 1);
                            }
                        }
                    }
                }
            }

            addXP(amount) {
                this.playerXP += amount;
                while (this.playerXP >= this.xpToNextLevel) {
                    this.playerXP -= this.xpToNextLevel;
                    this.playerLevel++;
                    this.xpToNextLevel = Math.floor(this.xpToNextLevel * 1.5);
                    // Level up bonuses
                    this.player.maxHealth += 20;
                    this.player.health = Math.min(this.player.health + 20, this.player.maxHealth);
                    this.player.baseAttackDamage += 3;
                    this.player.baseAttackRange += 2;
                    this.player.applyItemStats(this.slots[this.selectedSlot]);
                }
            }

            spawnEnemy() {
                const margin = 100;
                const side = Math.floor(Math.random() * 4);
                let x, y;
                if (side === 0) { // top
                    x = this.player.x + (Math.random() - 0.5) * this.width;
                    y = this.player.y - this.height / 2 - margin;
                } else if (side === 1) { // right
                    x = this.player.x + this.width / 2 + margin;
                    y = this.player.y + (Math.random() - 0.5) * this.height;
                } else if (side === 2) { // bottom
                    x = this.player.x + (Math.random() - 0.5) * this.width;
                    y = this.player.y + this.height / 2 + margin;
                } else { // left
                    x = this.player.x - this.width / 2 - margin;
                    y = this.player.y + (Math.random() - 0.5) * this.height;
                }

                // Random enemy type based on level
                const roll = Math.random();
                let enemy;
                if (roll < 0.5) {
                    enemy = new Enemy(x, y, {
                        speed: 1.2 + this.playerLevel * 0.05,
                        health: 50 + this.playerLevel * 10,
                        attackDamage: 8 + this.playerLevel * 2,
                        xpReward: 10 + this.playerLevel * 2,
                        type: 'normal'
                    });
                } else if (roll < 0.75) {
                    enemy = new FastEnemy(x, y);
                } else if (roll < 0.9) {
                    enemy = new TankEnemy(x, y);
                } else {
                    enemy = new FlyingEnemy(x, y);
                }
                this.enemies.push(enemy);
            }

            update(dt) {
                // Save position for collision rollback
                const prevX = this.player.x;
                const prevY = this.player.y;

                this.player.update(this.keys);

                // Wall collision - check corners of player bounding box
                const half = this.player.size / 2;
                const corners = [
                    { x: this.player.x - half, y: this.player.y - half },
                    { x: this.player.x + half, y: this.player.y - half },
                    { x: this.player.x - half, y: this.player.y + half },
                    { x: this.player.x + half, y: this.player.y + half }
                ];

                let collision = false;
                for (const corner of corners) {
                    const tileX = Math.floor(corner.x / TILE_SIZE);
                    const tileY = Math.floor(corner.y / TILE_SIZE);
                    if (this.tileMap.isWall(tileX, tileY)) {
                        collision = true;
                        break;
                    }
                }

                if (collision) {
                    this.player.x = prevX;
                    this.player.y = prevY;
                }

                // Spawn enemies
                this.spawnTimer += dt;
                if (this.spawnTimer >= this.spawnInterval) {
                    this.spawnTimer = 0;
                    this.spawnEnemy();
                }

                // Update enemies
                for (const enemy of this.enemies) {
                    enemy.update(this.player.x, this.player.y);
                    if (enemy.tryAttack(this.player.x, this.player.y)) {
                        this.player.health -= enemy.attackDamage;
                        if (this.player.health < 0) this.player.health = 0;
                    }
                }

                // Update arrows and check collisions
                for (let i = this.arrows.length - 1; i >= 0; i--) {
                    const arrow = this.arrows[i];
                    arrow.update();

                    // Check collision with enemies
                    let hit = false;
                    for (let j = this.enemies.length - 1; j >= 0; j--) {
                        const enemy = this.enemies[j];
                        const dx = arrow.x - enemy.x;
                        const dy = arrow.y - enemy.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < enemy.size / 2 + arrow.size) {
                            enemy.health -= arrow.damage;
                            if (enemy.health <= 0) {
                                this.addXP(enemy.xpReward);
                                this.enemies.splice(j, 1);
                            }
                            hit = true;
                            break;
                        }
                    }

                    if (hit) {
                        this.arrows.splice(i, 1);
                    }
                }
            }

            draw() {
                const ctx = this.ctx;
                ctx.clearRect(0, 0, this.width, this.height);

                // Offset for drawing entities relative to player
                const offsetX = this.width / 2 - this.player.x;
                const offsetY = this.height / 2 - this.player.y;

                // Draw tile map
                this.tileMap.draw(ctx, offsetX, offsetY);

                // Draw arrows
                for (const arrow of this.arrows) {
                    arrow.draw(ctx, offsetX, offsetY);
                }

                // Draw enemies
                for (const enemy of this.enemies) {
                    enemy.draw(ctx, offsetX, offsetY);
                }

                // Player is always drawn at center of screen
                const screenX = this.width / 2;
                const screenY = this.height / 2;

                this.player.draw(ctx, screenX, screenY);

                // Update UI with coordinates, level and XP
                this.ui.innerHTML = `X: ${Math.round(this.player.x)}, Y: ${Math.round(this.player.y)}<br>Lv.${this.playerLevel} XP: ${this.playerXP}/${this.xpToNextLevel}`;
            }

            run() {
                const now = performance.now();
                const dt = now - this.lastTime;
                this.lastTime = now;

                this.update(dt);
                this.draw();
                requestAnimationFrame(() => this.run());
            }
        }

        // ========== Start ==========
        const game = new Game('gameCanvas', 'ui');
    </script>
</body>
