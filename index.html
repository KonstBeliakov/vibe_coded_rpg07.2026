<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            display: block;
            background: #222;
            border: 1px solid #444;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-family: monospace;
            font-size: 16px;
            background: rgba(0,0,0,0.6);
            padding: 8px 12px;
            border-radius: 4px;
            pointer-events: none;
            user-select: none;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="ui">X: 0, Y: 0</div>
    <div id="deathScreen" style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:none; justify-content:center; align-items:center; flex-direction:column; color:#fff; font-family:monospace;">
        <h1 style="font-size:48px; color:#e53935; margin-bottom:20px;">ВЫ УМЕРЛИ</h1>
        <p id="deathStats" style="font-size:18px; margin-bottom:30px;"></p>
        <button id="restartBtn" style="padding:12px 30px; font-size:20px; background:#4caf50; color:#fff; border:none; border-radius:6px; cursor:pointer; font-family:monospace;">Начать заново</button>
    </div>

    <script src="js/perlin.js"></script>
    <script src="js/tilemap.js"></script>
    <script src="js/particles.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/arrow.js"></script>
    <script src="js/item.js"></script>
    <script src="js/chest.js"></script>
    <script src="js/potion.js"></script>
    <script src="js/enemy.js"></script>
    <script src="js/player.js"></script>
    <script src="js/game.js"></script>
    <script>
        const game = new Game('gameCanvas', 'ui');
    </script>
</body>
</html>
